<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Religion Discipline</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0a0a;
  --bg2: #111111;
  --bg3: #181818;
  --card: #141414;
  --card2: #1c1c1c;
  --border: #2a2a2a;
  --border2: #333333;
  --gold: #c9a84c;
  --gold2: #e8c96d;
  --gold3: #f5dfa0;
  --gold-dim: rgba(201,168,76,0.15);
  --gold-glow: rgba(201,168,76,0.08);
  --text: #f0ede8;
  --text2: #a09a92;
  --text3: #5a5550;
  --green: #4caf7d;
  --green-dim: rgba(76,175,125,0.12);
  --orange: #e8894c;
  --orange-dim: rgba(232,137,76,0.12);
  --red: #c94c4c;
  --red-dim: rgba(201,76,76,0.12);
  --blue: #4c7ec9;
  --blue-dim: rgba(76,126,201,0.12);
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-gold: 0 0 24px rgba(201,168,76,0.15);
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* HEADER */
.app-header {
  background: linear-gradient(180deg, #0f0f0f 0%, var(--bg) 100%);
  border-bottom: 1px solid var(--border);
  padding: 20px 20px 0;
  position: sticky;
  top: 0;
  z-index: 100;
  backdrop-filter: blur(20px);
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.app-title {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--gold2);
  letter-spacing: 0.5px;
}

.app-subtitle {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-top: 2px;
}

.year-selector {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 40px;
  padding: 6px 12px;
}

.year-btn {
  background: none;
  border: none;
  color: var(--gold);
  font-size: 16px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
}

.year-display {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--gold2);
  font-weight: 500;
  min-width: 36px;
  text-align: center;
}

/* NAV TABS */
.nav-tabs {
  display: flex;
  gap: 0;
  border-bottom: 1px solid var(--border);
}

.nav-tab {
  flex: 1;
  background: none;
  border: none;
  color: var(--text3);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 12px 4px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: all 0.2s;
  letter-spacing: 0.3px;
}

.nav-tab.active {
  color: var(--gold2);
  border-bottom-color: var(--gold);
}

/* VIEWS */
.view { display: none; padding: 20px 16px 100px; }
.view.active { display: block; }

/* CARDS */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 14px;
}

.card-gold {
  background: linear-gradient(135deg, #141200 0%, var(--card) 100%);
  border-color: rgba(201,168,76,0.3);
}

.section-label {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--gold);
  font-weight: 600;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, var(--border2), transparent);
}

/* DATE SELECTOR */
.date-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 20px;
}

.date-input {
  flex: 1;
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  padding: 12px 14px;
  outline: none;
  cursor: pointer;
}

.date-input:focus { border-color: var(--gold); }

.today-btn {
  background: var(--gold-dim);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: var(--radius-sm);
  color: var(--gold2);
  font-size: 12px;
  font-weight: 600;
  padding: 12px 14px;
  cursor: pointer;
  white-space: nowrap;
  font-family: 'DM Sans', sans-serif;
}

/* SCORE CARD */
.score-card {
  background: linear-gradient(135deg, #0f0e00 0%, #141200 50%, var(--card) 100%);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: var(--radius);
  padding: 22px;
  margin-bottom: 14px;
  text-align: center;
  position: relative;
  overflow: hidden;
}

.score-card::before {
  content: '';
  position: absolute;
  top: -40px;
  right: -40px;
  width: 120px;
  height: 120px;
  background: radial-gradient(circle, rgba(201,168,76,0.08) 0%, transparent 70%);
  border-radius: 50%;
}

.score-big {
  font-family: 'Playfair Display', serif;
  font-size: 64px;
  font-weight: 900;
  color: var(--gold2);
  line-height: 1;
  letter-spacing: -2px;
}

.score-max { font-size: 22px; color: var(--text3); font-weight: 400; }

.score-label {
  font-size: 11px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text2);
  margin-top: 6px;
}

.score-level {
  display: inline-block;
  margin-top: 12px;
  padding: 5px 16px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.level-0 { background: var(--red-dim); color: var(--red); border: 1px solid var(--red); }
.level-1 { background: var(--orange-dim); color: var(--orange); border: 1px solid var(--orange); }
.level-2 { background: var(--gold-dim); color: var(--gold2); border: 1px solid rgba(201,168,76,0.4); }
.level-3 { background: var(--green-dim); color: var(--green); border: 1px solid var(--green); }

.progress-bar-wrap {
  background: var(--bg3);
  border-radius: 4px;
  height: 6px;
  margin-top: 16px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
  transition: width 0.6s ease;
}

/* SCORE MINI STATS */
.score-mini {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-top: 14px;
}

.score-mini-item {
  background: var(--bg3);
  border-radius: var(--radius-sm);
  padding: 10px;
  text-align: center;
}

.score-mini-num {
  font-family: 'Playfair Display', serif;
  font-size: 22px;
  color: var(--gold2);
  font-weight: 700;
}

.score-mini-lbl {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
  letter-spacing: 0.5px;
}

/* PRAYERS */
.prayer-grid {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.prayer-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.prayer-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  letter-spacing: 0.5px;
}

.prayer-options {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.prayer-btn {
  flex: 1;
  min-width: 0;
  padding: 9px 6px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-size: 11px;
  font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}

.prayer-btn.selected-mosque {
  background: var(--green-dim);
  border-color: var(--green);
  color: var(--green);
}

.prayer-btn.selected-home {
  background: var(--gold-dim);
  border-color: var(--gold);
  color: var(--gold2);
}

.prayer-btn.selected-late {
  background: var(--red-dim);
  border-color: var(--red);
  color: var(--red);
}

.prayer-btn.selected-none {
  background: var(--bg3);
  border-color: var(--border2);
  color: var(--text3);
}

.rawatib-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 0;
  border-top: 1px solid var(--border);
}

.rawatib-label {
  font-size: 11px;
  color: var(--text3);
  letter-spacing: 0.5px;
}

.toggle-btn {
  width: 40px;
  height: 22px;
  border-radius: 11px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  cursor: pointer;
  position: relative;
  transition: all 0.2s;
}

.toggle-btn::after {
  content: '';
  position: absolute;
  width: 16px;
  height: 16px;
  border-radius: 50%;
  background: var(--text3);
  top: 2px;
  left: 2px;
  transition: all 0.2s;
}

.toggle-btn.on {
  background: var(--gold-dim);
  border-color: var(--gold);
}

.toggle-btn.on::after {
  background: var(--gold2);
  left: 20px;
}

/* HABITS */
.habit-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 11px 0;
  border-bottom: 1px solid var(--border);
}

.habit-row:last-child { border-bottom: none; }

.habit-name {
  font-size: 13px;
  color: var(--text);
  font-weight: 400;
}

.habit-sub {
  font-size: 10px;
  color: var(--text3);
  margin-top: 2px;
}

.counter-row {
  display: flex;
  align-items: center;
  gap: 10px;
}

.counter-btn {
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  font-family: 'DM Sans', sans-serif;
}

.counter-btn:active { background: var(--gold-dim); border-color: var(--gold); }

.counter-val {
  font-family: 'DM Mono', monospace;
  font-size: 15px;
  color: var(--gold2);
  min-width: 28px;
  text-align: center;
  font-weight: 500;
}

.notes-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 12px 14px;
  outline: none;
  resize: vertical;
  min-height: 80px;
  margin-top: 8px;
}

.notes-input:focus { border-color: var(--gold); }

/* SAVE BTN */
.save-btn {
  width: 100%;
  background: linear-gradient(135deg, var(--gold), var(--gold2));
  border: none;
  border-radius: var(--radius);
  color: #0a0800;
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 700;
  padding: 16px;
  cursor: pointer;
  letter-spacing: 0.5px;
  margin-top: 8px;
  box-shadow: 0 4px 20px rgba(201,168,76,0.25);
  transition: all 0.2s;
}

.save-btn:active { transform: scale(0.98); box-shadow: 0 2px 10px rgba(201,168,76,0.2); }

/* WEEK / MONTH / YEAR VIEWS */
.stat-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.stat-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 14px;
  text-align: center;
}

.stat-box-num {
  font-family: 'Playfair Display', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--gold2);
  line-height: 1;
}

.stat-box-label {
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 1px;
  text-transform: uppercase;
  margin-top: 5px;
}

.stat-box.highlight {
  background: linear-gradient(135deg, #0f0e00, var(--card));
  border-color: rgba(201,168,76,0.3);
}

/* WEEK CARDS */
.week-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all 0.2s;
}

.week-card:active { border-color: var(--gold); background: var(--card2); }

.week-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}

.week-num {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--gold2);
  font-weight: 700;
}

.week-dates {
  font-size: 11px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
}

.week-score-badge {
  background: var(--gold-dim);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 20px;
  padding: 4px 12px;
  font-size: 12px;
  font-weight: 600;
  color: var(--gold2);
  font-family: 'DM Mono', monospace;
}

.week-dots {
  display: flex;
  gap: 4px;
}

.week-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--border2);
}

.week-dot.filled { background: var(--gold); }
.week-dot.partial { background: var(--orange); }

/* STAT DETAIL ROWS */
.detail-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.detail-row:last-child { border-bottom: none; }

.detail-label { font-size: 13px; color: var(--text2); }

.detail-val {
  font-family: 'DM Mono', monospace;
  font-size: 14px;
  color: var(--gold2);
  font-weight: 500;
}

.bar-row {
  margin-bottom: 10px;
}

.bar-label-row {
  display: flex;
  justify-content: space-between;
  margin-bottom: 5px;
}

.bar-label { font-size: 12px; color: var(--text2); }
.bar-num { font-size: 12px; color: var(--gold2); font-family: 'DM Mono', monospace; }

.bar-track {
  background: var(--bg3);
  border-radius: 4px;
  height: 5px;
  overflow: hidden;
}

.bar-fill {
  height: 100%;
  border-radius: 4px;
  background: linear-gradient(90deg, var(--gold), var(--gold2));
}

.bar-fill.green { background: linear-gradient(90deg, #3d9e68, var(--green)); }
.bar-fill.blue { background: linear-gradient(90deg, #3a6bab, var(--blue)); }
.bar-fill.orange { background: linear-gradient(90deg, #c07040, var(--orange)); }

/* MONTH CALENDAR */
.month-selector {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 16px;
}

.month-nav-btn {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--gold);
  font-size: 18px;
  width: 36px;
  height: 36px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

.month-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  color: var(--gold2);
  font-weight: 700;
}

.cal-grid {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 4px;
}

.cal-header {
  text-align: center;
  font-size: 10px;
  color: var(--text3);
  letter-spacing: 0.5px;
  padding: 4px 0;
  font-weight: 600;
}

.cal-day {
  background: var(--card2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 6px 2px;
  text-align: center;
  cursor: pointer;
  min-height: 48px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  transition: all 0.15s;
  position: relative;
}

.cal-day:active { border-color: var(--gold); }

.cal-day-num {
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  line-height: 1;
}

.cal-day-score {
  font-size: 9px;
  font-family: 'DM Mono', monospace;
  margin-top: 3px;
  border-radius: 3px;
  padding: 1px 3px;
  font-weight: 600;
}

.cal-day.empty { background: transparent; border-color: transparent; cursor: default; }
.cal-day.today { border-color: var(--gold); }

.score-color-0 { background: var(--bg); color: var(--text3); }
.score-color-1 { background: rgba(201,76,76,0.2); color: var(--red); }
.score-color-2 { background: rgba(232,137,76,0.2); color: var(--orange); }
.score-color-3 { background: rgba(201,168,76,0.2); color: var(--gold2); }
.score-color-4 { background: rgba(76,175,125,0.2); color: var(--green); }

/* HEATMAP */
.heatmap-wrap {
  overflow-x: auto;
  padding-bottom: 8px;
}

.heatmap-grid {
  display: grid;
  grid-template-columns: repeat(53, 1fr);
  gap: 2px;
  min-width: 500px;
}

.heatmap-cell {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 2px;
  background: var(--bg3);
  cursor: pointer;
  transition: all 0.15s;
}

.heatmap-cell:hover { opacity: 0.8; transform: scale(1.2); }
.heatmap-cell.h0 { background: var(--bg3); }
.heatmap-cell.h1 { background: rgba(201,168,76,0.2); }
.heatmap-cell.h2 { background: rgba(201,168,76,0.4); }
.heatmap-cell.h3 { background: rgba(201,168,76,0.65); }
.heatmap-cell.h4 { background: var(--gold2); }

/* MONTH BARS */
.month-bars {
  display: flex;
  align-items: flex-end;
  gap: 4px;
  height: 70px;
  margin-top: 8px;
}

.month-bar-col {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  height: 100%;
  gap: 3px;
}

.month-bar {
  width: 100%;
  border-radius: 3px 3px 0 0;
  background: linear-gradient(180deg, var(--gold2), var(--gold));
  min-height: 2px;
  transition: height 0.4s ease;
}

.month-bar-lbl {
  font-size: 8px;
  color: var(--text3);
  font-family: 'DM Mono', monospace;
}

/* MODALS */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: flex-end;
  justify-content: center;
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 24px 24px 0 0;
  padding: 24px 20px 40px;
  width: 100%;
  max-width: 480px;
  max-height: 85vh;
  overflow-y: auto;
}

.modal-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  color: var(--gold2);
  font-weight: 700;
  margin-bottom: 20px;
}

.modal-close {
  float: right;
  background: var(--border);
  border: none;
  color: var(--text2);
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* TOAST */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: var(--gold);
  color: #0a0800;
  padding: 10px 22px;
  border-radius: 40px;
  font-size: 13px;
  font-weight: 700;
  z-index: 300;
  transition: transform 0.3s ease;
  white-space: nowrap;
}

.toast.show { transform: translateX(-50%) translateY(0); }

/* UTILS */
.btn-sm {
  background: var(--card2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text2);
  font-size: 12px;
  padding: 7px 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
}

.btn-danger {
  background: var(--red-dim);
  border-color: var(--red);
  color: var(--red);
}

.flex-row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 14px;
}

.empty-state .icon { font-size: 36px; margin-bottom: 10px; }

/* Back btn */
.back-btn {
  display: flex;
  align-items: center;
  gap: 6px;
  background: none;
  border: none;
  color: var(--gold);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  margin-bottom: 16px;
  font-family: 'DM Sans', sans-serif;
  padding: 0;
}

.chip {
  display: inline-flex;

<script>
// ============================================================

// ============================================================
// STATE
// ============================================================
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let activeView = 'jour';
let data = {};

// Quran state
let quranYear = new Date().getFullYear();
let quranMonth = new Date().getMonth();
let quranData = {};

// ============================================================
// STORAGE
// ============================================================
function getStorageKey(year) { return `rd_data_${year}`; }

function loadYear(year) {
  const raw = localStorage.getItem(getStorageKey(year));
  if (raw) {
    try { return JSON.parse(raw); }
    catch(e) { return {}; }
  }
  return {};
}

function saveYear(year, obj) {
  localStorage.setItem(getStorageKey(year), JSON.stringify(obj));
}

function loadAllData() {
  data = loadYear(currentYear);
}

function saveAllData() {
  saveYear(currentYear, data);
}

// ============================================================
// DATE UTILS
// ============================================================
function todayStr() {
  return new Date().toISOString().slice(0,10);
}

function dateStr(y, m, d) {
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function parseDate(str) {
  const [y,m,d] = str.split('-').map(Number);
  return new Date(y, m-1, d);
}

function daysInMonth(y, m) { return new Date(y, m+1, 0).getDate(); }

function weekNum(dateStr) {
  const d = parseDate(dateStr);
  const start = new Date(d.getFullYear(), 0, 1);
  const diff = d - start;
  const oneWeek = 7 * 24 * 3600 * 1000;
  return Math.ceil((diff / oneWeek) + start.getDay() / 7);
}

function getWeekDates(year, week) {
  const jan1 = new Date(year, 0, 1);
  const dayOfWeek = jan1.getDay() || 7;
  const firstMon = new Date(jan1);
  firstMon.setDate(jan1.getDate() - (dayOfWeek - 1));
  const start = new Date(firstMon);
  start.setDate(firstMon.getDate() + (week - 1) * 7);
  const end = new Date(start);
  end.setDate(start.getDate() + 6);
  return { start, end };
}

function formatShortDate(d) {
  return `${d.getDate().toString().padStart(2,'0')}/${(d.getMonth()+1).toString().padStart(2,'0')}`;
}

function getDayKey(d) {
  return d.toISOString().slice(0,10);
}

function weeksInYear(year) {
  const dec31 = new Date(year, 11, 31);
  return weekNum(getDayKey(dec31));
}

// ============================================================
// YEAR / VIEW MANAGEMENT
// ============================================================
function changeYear(delta) {
  currentYear += delta;
  document.getElementById('yearDisplay').textContent = currentYear;
  loadAllData();
  renderCurrentView();
}

function showView(v) {
  activeView = v;
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(el => el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  event.target.classList.add('active');
  renderCurrentView();
}

function renderCurrentView() {
  if (activeView === 'jour') { loadDay(); }
  else if (activeView === 'semaine') { renderWeekList(); }
  else if (activeView === 'mois') { renderMonth(); }
  else if (activeView === 'annee') { renderYear(); }
  else if (activeView === 'coran') { renderCoran(); }
  else if (activeView === 'stats') { renderStats(); }
}

// ============================================================
// DAY VIEW
// ============================================================
function buildDayTemplate() {
  const t = { prayers:{}, habits:{}, notes:'' };
  CONFIG.prayers.forEach(p => {
    t.prayers[p.id] = { status:'none', rawatib:false };
  });
  CONFIG.habits.forEach(h => {
    t.habits[h.id] = h.type === 'counter' ? 0 : false;
  });
  return t;
}

function goToday() {
  document.getElementById('dayDateInput').value = todayStr();
  loadDay();
}

function loadDay() {
  const dateInput = document.getElementById('dayDateInput');
  const d = dateInput.value || todayStr();
  if (!dateInput.value) dateInput.value = d;

  const [y] = d.split('-').map(Number);
  if (y !== currentYear) {
    currentYear = y;
    document.getElementById('yearDisplay').textContent = currentYear;
    loadAllData();
  }

  const dayData = data[d] || buildDayTemplate();
  renderPrayerGrid(dayData);
  renderHabitsGrid(dayData);
  document.getElementById('dayNotes').value = dayData.notes || '';
  updateDayScore(dayData);
}

function renderPrayerGrid(dayData) {
  const grid = document.getElementById('prayerGrid');
  grid.innerHTML = '';
  CONFIG.prayers.forEach(p => {
    const ps = dayData.prayers[p.id] || { status:'none', rawatib:false };
    const row = document.createElement('div');
    row.className = 'prayer-row';
    row.innerHTML = `
      <div class="prayer-name">${p.name}</div>
      <div class="prayer-options">
        ${['mosque','home','late','none'].map(s => `
          <button class="prayer-btn ${ps.status===s ? 'selected-'+s:''}"
            onclick="setPrayer('${p.id}','${s}',this)">
            ${s==='mosque'?'🕌 Mosquée':s==='home'?'🏠 Maison':s==='late'?'⏱ Retard':'✗ Manqué'}
          </button>
        `).join('')}
      </div>
      ${p.rawatib ? `
      <div class="rawatib-row">
        <div class="rawatib-label">Rawatib (${p.rawatibCount} rak'at)</div>
        <button class="toggle-btn ${ps.rawatib?'on':''}" id="raw-${p.id}"
          onclick="toggleRawatib('${p.id}',this)"></button>
      </div>` : ''}
    `;
    grid.appendChild(row);
  });
}

function renderHabitsGrid(dayData) {
  const grid = document.getElementById('habitsGrid');
  grid.innerHTML = '';
  CONFIG.habits.forEach(h => {
    const val = dayData.habits[h.id];
    const row = document.createElement('div');
    row.className = 'habit-row';
    if (h.type === 'counter') {
      row.innerHTML = `
        <div>
          <div class="habit-name">${h.name}</div>
          <div class="habit-sub">max ~${h.max} ${h.unit}</div>
        </div>
        <div class="counter-row">
          <button class="counter-btn" onclick="adjustCounter('${h.id}',-1)">−</button>
          <div class="counter-val" id="cnt-${h.id}">${val||0}</div>
          <button class="counter-btn" onclick="adjustCounter('${h.id}',1)">+</button>
        </div>
      `;
    } else {
      row.innerHTML = `
        <div class="habit-name">${h.name}</div>
        <button class="toggle-btn ${val?'on':''}" id="tog-${h.id}"
          onclick="toggleHabit('${h.id}',this)"></button>
      `;
    }
    grid.appendChild(row);
  });
}

function setPrayer(prayerId, status, btn) {
  const d = document.getElementById('dayDateInput').value;
  if (!data[d]) data[d] = buildDayTemplate();
  data[d].prayers[prayerId].status = status;
  // Update UI
  const options = btn.parentElement.querySelectorAll('.prayer-btn');
  options.forEach(b => {
    b.className = 'prayer-btn';
    const s = b.textContent.trim().includes('Mosquée')?'mosque':b.textContent.trim().includes('Maison')?'home':b.textContent.trim().includes('Retard')?'late':'none';
    if (s === status) b.classList.add('selected-'+s);
  });
  updateDayScore(data[d]);
  autoSave();
}

function toggleRawatib(prayerId, btn) {
  const d = document.getElementById('dayDateInput').value;
  if (!data[d]) data[d] = buildDayTemplate();
  data[d].prayers[prayerId].rawatib = !data[d].prayers[prayerId].rawatib;
  btn.classList.toggle('on');
  updateDayScore(data[d]);
  autoSave();
}

function toggleHabit(habitId, btn) {
  const d = document.getElementById('dayDateInput').value;
  if (!data[d]) data[d] = buildDayTemplate();
  data[d].habits[habitId] = !data[d].habits[habitId];
  btn.classList.toggle('on');
  updateDayScore(data[d]);
  autoSave();
}

function adjustCounter(habitId, delta) {
  const d = document.getElementById('dayDateInput').value;
  if (!data[d]) data[d] = buildDayTemplate();
  const current = data[d].habits[habitId] || 0;
  const newVal = Math.max(0, current + delta);
  data[d].habits[habitId] = newVal;
  document.getElementById('cnt-'+habitId).textContent = newVal;
  updateDayScore(data[d]);
  autoSave();
}

function autoSave() {
  const d = document.getElementById('dayDateInput').value;
  if (!data[d]) return;
  data[d].notes = document.getElementById('dayNotes').value;
  saveAllData();
}

function saveDay() {
  const d = document.getElementById('dayDateInput').value;
  if (!data[d]) data[d] = buildDayTemplate();
  data[d].notes = document.getElementById('dayNotes').value;
  saveAllData();
  showToast('✓ Journée enregistrée');
}

function calcScore(dayData) {
  if (!dayData) return 0;
  let score = 0;
  const P = CONFIG.points;

  CONFIG.prayers.forEach(p => {
    const ps = dayData.prayers?.[p.id] || {};
    if (ps.status === 'mosque') score += P.prayer_mosque;
    else if (ps.status === 'home') score += P.prayer_home;
    else if (ps.status === 'late') score += P.prayer_late;
    if (ps.rawatib) score += P.rawatib;
  });

  CONFIG.habits.forEach(h => {
    const val = dayData.habits?.[h.id];
    if (h.type === 'counter') {
      if (h.id === 'quran') score += (val||0) * P.quran_per_page;
    } else {
      if (val) score += P[h.id] || 2;
    }
  });

  return Math.min(Math.round(score), P.max_possible);
}

function getLevel(score) {
  return CONFIG.levels.find(l => score >= l.min && score <= l.max) || CONFIG.levels[0];
}

function updateDayScore(dayData) {
  const score = calcScore(dayData);
  const lvl = getLevel(score);
  document.getElementById('dayScore').innerHTML = `${score}<span class="score-max">/100</span>`;
  const levelEl = document.getElementById('dayLevel');
  levelEl.textContent = lvl.label;
  levelEl.className = 'score-level ' + lvl.cls;
  document.getElementById('dayProgressBar').style.width = score + '%';

  // Mini stats
  const prayers = dayData.prayers || {};
  const done = Object.values(prayers).filter(p => p.status && p.status !== 'none').length;
  document.getElementById('miniPrayers').textContent = `${done}/5`;
  document.getElementById('miniQuran').textContent = dayData.habits?.quran || 0;
  const habits = dayData.habits || {};
  const habitsDone = CONFIG.habits.filter(h => h.type !== 'counter' && habits[h.id]).length;
  document.getElementById('miniHabits').textContent = habitsDone;
}

// ============================================================
// WEEK VIEW
// ============================================================
function renderWeekList() {
  document.getElementById('weekYearLabel').textContent = currentYear;
  document.getElementById('weekListView').style.display = '';
  document.getElementById('weekDetailView').style.display = 'none';

  const total = weeksInYear(currentYear);
  const list = document.getElementById('weekList');
  list.innerHTML = '';

  const today = new Date();
  const currentWeekNum = weekNum(todayStr());

  for (let w = 1; w <= total; w++) {
    const { start, end } = getWeekDates(currentYear, w);
    const weekData = getWeekData(currentYear, w, start, end);

    const card = document.createElement('div');
    card.className = 'week-card';

    const dots = Array.from({length:7}, (_,i) => {
      const dc = new Date(start);
      dc.setDate(start.getDate() + i);
      const dk = getDayKey(dc);
      const score = data[dk] ? calcScore(data[dk]) : -1;
      let cls = 'week-dot';
      if (score >= 75) cls += ' filled';
      else if (score >= 30) cls += ' partial';
      return `<div class="${cls}"></div>`;
    }).join('');

    const isCurrent = w === currentWeekNum && currentYear === today.getFullYear();

    card.innerHTML = `
      <div class="week-card-header">
        <div>
          <div class="week-num">Semaine ${w} ${isCurrent?'<span style="font-size:11px;color:var(--gold3)">●</span>':''}</div>
          <div class="week-dates">${formatShortDate(start)} → ${formatShortDate(end)}</div>
        </div>
        <div class="week-score-badge">${weekData.avgScore}%</div>
      </div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="week-dots">${dots}</div>
        <div style="font-size:11px;color:var(--text3)">${weekData.filledDays}/7 jours</div>
      </div>
    `;
    card.onclick = () => showWeekDetail(w);
    list.appendChild(card);
  }
}

function getWeekData(year, weekN, start, end) {
  let totalScore = 0, filledDays = 0, bestScore = 0;
  const stats = {};
  CONFIG.prayers.forEach(p => {
    stats['p_'+p.id+'_mosque'] = 0;
    stats['p_'+p.id+'_home'] = 0;
    stats['p_'+p.id+'_late'] = 0;
    stats['p_'+p.id+'_none'] = 0;
    stats['p_'+p.id+'_raw'] = 0;
  });
  CONFIG.habits.forEach(h => { stats['h_'+h.id] = 0; });
  stats.streak = 0;

  let curStreak = 0;
  for (let i = 0; i < 7; i++) {
    const dc = new Date(start);
    dc.setDate(start.getDate() + i);
    const dk = getDayKey(dc);
    const day = data[dk];
    if (!day) { curStreak = 0; continue; }
    const s = calcScore(day);
    totalScore += s;
    filledDays++;
    if (s > bestScore) bestScore = s;
    curStreak++;
    if (curStreak > stats.streak) stats.streak = curStreak;
    CONFIG.prayers.forEach(p => {
      const ps = day.prayers?.[p.id] || {};
      if (ps.status) stats['p_'+p.id+'_'+ps.status]++;
      if (ps.rawatib) stats['p_'+p.id+'_raw']++;
    });
    CONFIG.habits.forEach(h => {
      const val = day.habits?.[h.id];
      stats['h_'+h.id] += h.type === 'counter' ? (val||0) : (val?1:0);
    });
  }

  return {
    avgScore: filledDays ? Math.round(totalScore/filledDays) : 0,
    filledDays,
    bestScore,
    stats,
  };
}

function getYearStats(year) {
  let avgScore = 0, filledDays = 0, bestStreak = 0, curStreak = 0, excellentDays = 0;
  const stats = {};
  CONFIG.prayers.forEach(p => {
    ['mosque','home','late','none','raw'].forEach(s => stats['p_'+p.id+'_'+s] = 0);
  });
  CONFIG.habits.forEach(h => { stats['h_'+h.id] = 0; });

  const monthScores = Array(12).fill(0);
  const monthFilled = Array(12).fill(0);

  for (let m = 0; m < 12; m++) {
    const total = daysInMonth(year, m);
    for (let d = 1; d <= total; d++) {
      const dk = dateStr(year, m, d);
      const day = data[dk];
      if (!day) { curStreak = 0; continue; }
      const s = calcScore(day);
      avgScore += s; filledDays++;
      monthScores[m] += s; monthFilled[m]++;
      if (s >= 75) excellentDays++;
      curStreak++;
      if (curStreak > bestStreak) bestStreak = curStreak;
      CONFIG.prayers.forEach(p => {
        const ps = day.prayers?.[p.id] || {};
        if (ps.status) stats['p_'+p.id+'_'+ps.status]++;
        if (ps.rawatib) stats['p_'+p.id+'_raw']++;
      });
      CONFIG.habits.forEach(h => {
        const val = day.habits?.[h.id];
        stats['h_'+h.id] += h.type === 'counter' ? (val||0) : (val?1:0);
      });
    }
  }

  const monthAvgs = monthScores.map((s,i) => monthFilled[i] ? Math.round(s/monthFilled[i]) : 0);

  return {
    avgScore: filledDays ? Math.round(avgScore/filledDays) : 0,
    filledDays, bestStreak, excellentDays, stats, monthScores: monthAvgs
  };
}

function renderHeatmap(year) {
  const grid = document.getElementById('heatmapGrid');
  if (!grid) return;
  grid.innerHTML = '';

  const jan1 = new Date(year, 0, 1);
  let dayOfWeek = jan1.getDay() - 1;
  if (dayOfWeek < 0) dayOfWeek = 6;

  // Empty cells before Jan 1
  for (let i = 0; i < dayOfWeek; i++) {
    const empty = document.createElement('div');
    grid.appendChild(empty);
  }

  for (let m = 0; m < 12; m++) {
    const total = daysInMonth(year, m);
    for (let d = 1; d <= total; d++) {
      const dk = dateStr(year, m, d);
      const day = data[dk];
      const score = day ? calcScore(day) : -1;
      let level = 0;
      if (score >= 75) level = 4;
      else if (score >= 50) level = 3;
      else if (score >= 30) level = 2;
      else if (score >= 0) level = 1;

      const cell = document.createElement('div');
      cell.className = `heatmap-cell h${score < 0 ? 0 : level}`;
      cell.title = `${dk}: ${score >= 0 ? score + '/100' : 'Non rempli'}`;
      cell.onclick = () => { openDayFromCalendar(dk); };
      grid.appendChild(cell);
    }
  }
}

function exportData() {
  const allData = {};
  for (let y = 2024; y <= 2050; y++) {
    const d = loadYear(y);
    if (Object.keys(d).length) allData[y] = d;
  }
  const blob = new Blob([JSON.stringify(allData, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `religion-discipline-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  showToast('✓ Export réussi');
}

function importData() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = e => {
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const allData = JSON.parse(ev.target.result);
        Object.entries(allData).forEach(([y, d]) => {
          saveYear(parseInt(y), d);
        });
        loadAllData();
        renderCurrentView();
        showToast('✓ Import réussi');
      } catch(err) {
        showToast('✗ Erreur import JSON');
      }
    };
    reader.readAsText(file);
  };
  input.click();
}

function resetYear() {
  if (!confirm(`Réinitialiser toutes les données de ${currentYear} ? Cette action est irréversible.`)) return;
  data = {};
  saveAllData();
  renderCurrentView();
  showToast(`✓ Année ${currentYear} réinitialisée`);
}

function loadQuranData() {
  const raw = localStorage.getItem('rd_quran_' + quranYear);
  if (raw) { try { quranData = JSON.parse(raw); } catch(e) { quranData = {}; } }
  else quranData = {};
}

function saveQuranData() {
  localStorage.setItem('rd_quran_' + quranYear, JSON.stringify(quranData));
}

function changeQuranMonth(delta) {
  quranMonth += delta;
  if (quranMonth < 0) { quranMonth = 11; quranYear--; loadQuranData(); }
  else if (quranMonth > 11) { quranMonth = 0; quranYear++; loadQuranData(); }
  renderCoran();
}

function toggleSurah(num) {
  const mk = quranYear + '-' + String(quranMonth + 1).padStart(2, '0');
  if (!quranData[mk]) quranData[mk] = {};
  if (quranData[mk][num]) delete quranData[mk][num];
  else quranData[mk][num] = true;
  saveQuranData();
  renderCoran();
}

  const monthSurahs = quranData[mk] || {};

  const pct = Math.round(count / 114 * 100);

  document.getElementById('quranMonthTitle').textContent =
    CONFIG.months_fr[quranMonth] + ' ' + quranYear;

  document.getElementById('quranProgress').innerHTML = `
    <div class="score-card" style="margin-bottom:16px">
      <div class="score-big">${count}<span class="score-max">/114</span></div>
      <div class="score-label">Sourates lues ce mois</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" style="width:${pct}%"></div>
      </div>
    </div>
  `;

  document.getElementById('surahGrid').innerHTML =
    '<div class="section-label">Sourates du Coran</div>' +
    '<div class="card"><div class="surah-list">' +
    CONFIG.surahs.map((s, i) => {
      const num = i + 1;
      const checked = !!monthSurahs[num];
      return `<div class="surah-item${checked ? ' checked' : ''}" onclick="toggleSurah(${num})">
        <div class="surah-num">${num}</div>
        <div class="surah-name">${s}</div>
        <div class="surah-check">${checked ? '✓' : ''}</div>
      </div>`;
    }).join('') +
    '</div></div>';
}

// ============================================================
// ONGLET STATS
// ============================================================
function renderStats() {
  const today = new Date();
  const isCurrentYear = currentYear === today.getFullYear();

  let loggedDays = 0;
  const habitCounts = {};
  CONFIG.habits.forEach(h => {
    habitCounts[h.id] = h.type === 'counter' ? { days: 0, total: 0 } : 0;
  });
  const prayerCounts = {};
  CONFIG.prayers.forEach(p => {
    prayerCounts[p.id] = { mosque: 0, home: 0, late: 0, none: 0 };
  });

  for (let m = 0; m < 12; m++) {
    for (let d = 1; d <= daysInMonth(currentYear, m); d++) {
      if (isCurrentYear && new Date(currentYear, m, d) > today) continue;
      const key = dateStr(currentYear, m, d);
      const day = data[key];
      if (!day) continue;
      loggedDays++;
      CONFIG.habits.forEach(h => {
        const val = day.habits?.[h.id];
        if (h.type === 'counter') {
          if ((val || 0) > 0) { habitCounts[h.id].days++; habitCounts[h.id].total += val; }
        } else {
          if (val) habitCounts[h.id]++;
        }
      });
      CONFIG.prayers.forEach(p => {
        const status = day.prayers?.[p.id]?.status || 'none';
        prayerCounts[p.id][status]++;
      });
    }
  }

  if (loggedDays === 0) {
    document.getElementById('statsContent').innerHTML =
      '<div class="empty-state"><div class="icon">📊</div>Aucune donnée pour ' + currentYear + '</div>';
    return;
  }

  const pct = n => Math.round(n / loggedDays * 100);
  const fillCls = p => p >= 70 ? 'green' : p >= 40 ? 'orange' : 'red';
  const badgeCls = p => p >= 70 ? 'strong' : p >= 40 ? 'medium' : 'weak';
  const txtCls = p => p >= 70 ? 'strong' : p >= 40 ? 'medium' : 'weak';

  let html = `
    <div class="score-card" style="margin-bottom:16px">
      <div style="font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px">Bilan ${currentYear}</div>
      <div style="font-size:22px;font-weight:700;color:var(--gold2);font-family:'DM Mono',monospace">${loggedDays}<span style="font-size:13px;color:var(--text3);font-family:'DM Sans',sans-serif"> jours tracés</span></div>
    </div>
    <div class="section-label">🕌 Prières</div>
    <div class="card" style="margin-bottom:16px">
  `;

  CONFIG.prayers.forEach(p => {
    const cnt = prayerCounts[p.id];
    const mPct = pct(cnt.mosque);
    const hPct = pct(cnt.home);
    const lPct = pct(cnt.late);
    const nPct = pct(cnt.none);
    const fc = fillCls(mPct);
    const bc = badgeCls(mPct);
    html += `
      <div class="bar-row">
        <div class="bar-label-row">
          <span class="bar-label">${p.name}</span>
          <span class="stat-badge ${bc}">${mPct}%&nbsp;mosquée</span>
        </div>
        <div class="bar-track"><div class="bar-fill ${fc}" style="width:${mPct}%"></div></div>
        <div class="stat-sub">
          <span style="color:var(--green)">🕌 ${mPct}%</span>
          <span style="color:var(--orange)">🏠 ${hPct}%</span>
          ${lPct > 0 ? `<span style="color:var(--text3)">⏱ ${lPct}%</span>` : ''}
          ${nPct > 0 ? `<span style="color:var(--red)">✗ ${nPct}%</span>` : ''}
        </div>
      </div>
    `;
  });

  html += `</div><div class="section-label">📿 Habitudes</div><div class="card">`;

  const habitItems = CONFIG.habits.map(h => {
    if (h.type === 'counter') {
      const { days, total } = habitCounts[h.id];
      return { name: h.name, p: pct(days), extra: days > 0 ? (total / days).toFixed(1) + ' p/j' : '' };
    }
    return { name: h.name, p: pct(habitCounts[h.id]), extra: '' };
  }).sort((a, b) => b.p - a.p);

  habitItems.forEach(({ name, p: hp, extra }) => {
    const fc = fillCls(hp);
    const tc = txtCls(hp);
    html += `
      <div class="bar-row">
        <div class="bar-label-row">
          <span class="bar-label">${name}</span>
          <span class="stat-bar-pct ${tc}">${hp}%${extra ? ' · ' + extra : ''}</span>
        </div>
        <div class="bar-track"><div class="bar-fill ${fc}" style="width:${hp}%"></div></div>
      </div>
    `;
  });

  html += `</div>`;
  document.getElementById('statsContent').innerHTML = html;
}

// ============================================================

function init() {
  const today = new Date();
  currentYear = today.getFullYear();
  currentMonth = today.getMonth();
  quranYear = today.getFullYear();
  quranMonth = today.getMonth();
  document.getElementById('yearDisplay').textContent = currentYear;
  document.getElementById('dayDateInput').value = todayStr();
  loadAllData();
  loadQuranData();
  loadDay();
}

init();
